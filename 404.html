<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <title>Página no encontrada - PEGASSO Editorial</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Error 404, Editorial Pegasso" name="keywords">
    <meta content="Página no encontrada - Editorial Pegasso" name="description">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #1e3a8a; /* Azul Oxford */
            --light-blue: #60a5fa;   /* Azul Brillante para acentos */
            --dark-bg: #0f172a;      /* Azul Medianoche muy oscuro */
            --text-silver: #e2e8f0;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-silver);
            overflow: hidden;
        }

        /* Fondo animado con tonos azules */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            z-index: -1;
        }

        .animated-gradient {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.1) 0%, transparent 50%, rgba(30, 58, 138, 0.1) 100%);
            animation: moveGradient 12s ease infinite alternate;
        }

        @keyframes moveGradient {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(2%, 2%); }
        }

        .error-wrapper {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .content-card {
            max-width: 700px;
            animation: fadeIn 1.2s ease-out;
        }

        .error-code {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(120px, 22vw, 200px);
            font-weight: 700;
            line-height: 0.9;
            color: var(--light-blue);
            margin-bottom: 0;
            text-shadow: 0px 0px 40px rgba(96, 165, 250, 0.3);
            animation: float 5s ease-in-out infinite;
        }

        .error-message {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 500;
            font-style: italic;
            margin-top: 10px;
            margin-bottom: 25px;
            color: white;
        }

        .description {
            font-weight: 300;
            line-height: 1.8;
            margin-bottom: 40px;
            color: #94a3b8;
            letter-spacing: 0.5px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-pegasso {
            background: transparent;
            border: 1px solid var(--light-blue);
            color: var(--light-blue);
            padding: 16px 45px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            text-decoration: none;
            display: inline-block;
        }

        .btn-pegasso:hover {
            background: var(--light-blue);
            color: var(--dark-bg);
            box-shadow: 0 10px 25px rgba(96, 165, 250, 0.4);
            transform: translateY(-5px);
        }

        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, var(--light-blue), transparent);
            margin: 25px auto;
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Partículas de luz azul */
        .glow-point {
            position: absolute;
            background: var(--light-blue);
            border-radius: 50%;
            filter: blur(2px);
            opacity: 0.2;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.5); }
        }
    </style>
</head>

<body>

    <div class="bg-overlay">
        <div class="animated-gradient"></div>
        <!-- Puntos de brillo azulados -->
        <div class="glow-point" style="top: 15%; left: 10%; width: 4px; height: 4px;"></div>
        <div class="glow-point" style="top: 40%; left: 85%; width: 6px; height: 6px; animation-delay: 1s;"></div>
        <div class="glow-point" style="top: 75%; left: 20%; width: 3px; height: 3px; animation-delay: 2.5s;"></div>
        <div class="glow-point" style="top: 20%; left: 70%; width: 2px; height: 2px; animation-delay: 3s;"></div>
    </div>

    <div class="error-wrapper">
        <div class="content-card">
            <h1 class="error-code">404</h1>
            <div class="divider"></div>
            <h2 class="error-message">Un rincón inexplorado</h2>
            <p class="description">
                Has llegado a una página que aún no ha sido escrita. 
                Permítenos guiarte de vuelta a las historias que sí conocemos.
            </p>

            <a href="https://zoca788.github.io/editorialpegasso/index.html" class="btn-pegasso">
                <i class="fa-solid fa-compass me-2"></i> Explorar Inicio
            </a>
            
            <div class="mt-5">
                <small style="opacity: 0.3; letter-spacing: 2px; text-transform: uppercase; font-size: 10px;">
                    PEGASSO Editorial &middot; Navegación Literaria
                </small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
